<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>30cm Mobile Ruler</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            /* Prevents "pull-to-refresh" which breaks measuring */
            overscroll-behavior: contain;
        }

        .ruler-container {
            background-color: #ffffff;
            color: #000;
            /* CSS 'cm' is the best anchor for mobile browsers */
            width: 80px;
            height: 30cm; 
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-left: 1px solid #ccc;
        }

        /* The Millimeter Ticks */
        .tick {
            position: absolute;
            right: 0;
            height: 1px;
            background-color: #000;
        }

        /* Tick lengths */
        .mm { width: 15px; }
        .mm-5 { width: 25px; height: 1.5px; }
        .cm { width: 40px; height: 2px; }

        .label {
            position: absolute;
            left: 10px;
            transform: translateY(-50%);
            font-weight: bold;
            font-size: 16px;
        }

        .info-panel {
            position: fixed;
            left: 100px;
            top: 20px;
            width: 150px;
            color: #aaa;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="ruler-container" id="ruler">
        </div>

    <div class="info-panel">
        <strong>Vertical Ruler</strong><br>
        Scroll down for 30cm.<br><br>
        <em>Note: If this looks wrong, check that your browser zoom is exactly 100%.</em>
    </div>

    <script>
        const ruler = document.getElementById('ruler');
        
        for (let i = 0; i <= 300; i++) {
            const tick = document.createElement('div');
            const position = (i / 10); // position in cm
            
            tick.style.top = position + 'cm';
            
            if (i % 10 === 0) {
                // Centimeter mark
                tick.className = 'tick cm';
                const label = document.createElement('div');
                label.className = 'label';
                label.innerText = i / 10;
                tick.appendChild(label);
            } else if (i % 5 === 0) {
                // 5mm mark
                tick.className = 'tick mm-5';
            } else {
                // 1mm mark
                tick.className = 'tick mm';
            }
            
            ruler.appendChild(tick);
        }
    </script>
</body>
</html>
