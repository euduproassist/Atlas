<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Student Application Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #4a90e2;
            --text-dark: #2c3e50;
            --text-gray: #666;
            --bg-light: #f9fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        /* Full Screen Loading Overlay */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; display: flex; justify-content: center;
            align-items: center; z-index: 1000; transition: opacity 0.5s;
        }

        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header matching your screenshots */
        .header {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-bottom: 1px solid #f0f0f0;
            color: #556080;
        }
        .header i { font-size: 2rem; color: var(--primary-blue); }
        .header h1 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-top: 80px;
            padding: 0 20px;
            max-width: 800px;
        }
        .hero h2 { font-size: 2.2rem; color: var(--text-dark); margin-bottom: 15px; }
        .hero p { font-size: 1.1rem; color: var(--text-gray); margin-bottom: 40px; }

        /* Button Container */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 80px;
        }
        .btn {
            padding: 12px 50px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
        }
        .btn-reg { background-color: var(--primary-blue); color: white; border: none; }
        .btn-reg:hover { background-color: #357abd; }
        
        .btn-login { background-color: white; color: #333; border: 1px solid #333; }
        .btn-login:hover { background-color: #f5f5f5; }

        /* Features Section at Bottom */
        .features {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #444;
            font-size: 0.95rem;
        }
        .feature-item i {
            color: var(--primary-blue);
            font-size: 1.2rem;
            border: 1px solid #eee;
            padding: 8px;
            border-radius: 6px;
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .btn-group { flex-direction: column; width: 100%; max-width: 300px; margin-left: auto; margin-right: auto; }
            .hero h2 { font-size: 1.8rem; }
            .features { flex-direction: column; align-items: flex-start; gap: 20px; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary-blue);"></i>
    </div>

    <div class="header">
        <i class="fas fa-graduation-cap"></i>
        <h1>Student Application Portal</h1>
    </div>

    <div class="hero">
        <h2>Welcome to the Student Application Portal</h2>
        <p>Apply online, upload your documents, track your application status.</p>

        <div class="btn-group">
            <a href="register.html" class="btn btn-reg">Register</a>
            <a href="login.html" class="btn btn-login">Login</a>
        </div>
    </div>

    <div class="features">
        <div class="feature-item">
            <i class="far fa-clipboard"></i>
            <span>Easy Online Applications</span>
        </div>
        <div class="feature-item">
            <i class="fas fa-cloud-upload-alt"></i>
            <span>Secure Document Upload</span>
        </div>
        <div class="feature-item">
            <i class="far fa-check-circle"></i>
            <span>Track Your Status</span>
        </div>
    </div>

    <script>
        // Smooth Loader Exit
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 300); // Small delay to look professional
        });
    </script>
</body>
</html>
